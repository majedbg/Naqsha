<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Naqsha — a painted grid for plotters and lasers</title>

    <!--
      Theme flash prevention. Runs before first paint so the correct
      data-theme attribute is set before any styled content renders.
      Naqsha defaults to light (paper) regardless of OS preference —
      the naqsheh anchor is paper; dark mode is available via the
      in-UI toggle but is never the first-visit default. A user's
      explicit choice (stored in localStorage) wins over the default.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('sonoform-theme');
          var theme = stored === 'dark' ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>

    <!-- Preconnect to font CDN so first paint doesn't wait on DNS. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
