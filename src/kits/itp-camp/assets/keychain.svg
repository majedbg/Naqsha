  <path fill="none" stroke="#000000" stroke-width="0.4"
        d="M 12.5 0 L 37.5 0 Q 50 0 50 12.5 Q 50 25 37.5 25 L 12.5 25 Q 0 25 0 12.5 Q 0 0 12.5 0 Z"/>
  <path fill="none" stroke="#000000" stroke-width="0.4"
        d="M 11 12.5 a 2.5 2.5 0 1 0 5 0 a 2.5 2.5 0 1 0 -5 0 Z"/>
</svg>
